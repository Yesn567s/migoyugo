<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="600" viewBox="0 0 1060 600">
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#00e5ff"/></marker></defs>
<rect width="1060" height="600" fill="#05080f"/><text x="55" y="70" fill="#fff" font-size="34" font-family="Arial" font-weight="900">Zobrist Hashing</text>
<text x="55" y="105" fill="#8ba3c7" font-size="22" font-family="Arial">Setiap posisi bidak punya angka acak 64-bit. Semua angka digabung dengan XOR.</text>
<g font-family="Arial">
<rect x="70" y="165" width="250" height="280" rx="16" fill="rgba(255,255,255,.04)" stroke="rgba(0,229,255,.35)"/><text x="95" y="205" fill="#00e5ff" font-size="26" font-weight="700">Board State</text><text x="95" y="245" fill="#8ba3c7" font-size="19">row, col</text><text x="95" y="275" fill="#8ba3c7" font-size="19">player</text><text x="95" y="305" fill="#8ba3c7" font-size="19">Migo / Yugo</text><text x="95" y="350" fill="#fff" font-size="24">A3 = White Yugo</text><text x="95" y="382" fill="#fff" font-size="24">D5 = Black Migo</text>
<rect x="405" y="165" width="250" height="280" rx="16" fill="rgba(255,255,255,.04)" stroke="rgba(0,229,255,.35)"/><text x="430" y="205" fill="#00e5ff" font-size="26" font-weight="700">ZOBRIST_TABLE</text><text x="430" y="245" fill="#8ba3c7" font-size="19">64 kotak × 4 tipe</text><text x="430" y="275" fill="#8ba3c7" font-size="19">+ 1 turn key</text><text x="430" y="325" fill="#fff" font-size="24">Total: 257 angka</text><text x="430" y="358" fill="#fff" font-size="24">BigUint64Array</text>
<rect x="740" y="165" width="250" height="280" rx="16" fill="rgba(255,255,255,.04)" stroke="rgba(0,229,255,.35)"/><text x="765" y="205" fill="#00e5ff" font-size="26" font-weight="700">currentHash</text><text x="765" y="245" fill="#8ba3c7" font-size="19">hash ^= pieceKey</text><text x="765" y="275" fill="#8ba3c7" font-size="19">hash ^= turnKey</text><text x="765" y="330" fill="#fff" font-size="23">Dipakai untuk</text><text x="765" y="363" fill="#fff" font-size="23">Transposition Table</text>
<path d="M330 305H395" stroke="#00e5ff" stroke-width="3" marker-end="url(#a)"/><path d="M665 305H730" stroke="#00e5ff" stroke-width="3" marker-end="url(#a)"/></g></svg>