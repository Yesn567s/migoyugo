<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Migoyugo - AI Engagement</title>
    <link rel="stylesheet" href="ai_game.css" />
  </head>
  <body>
    <!-- Initial Tactical Setup -->
    <div id="colorSelectionModal" class="modal show">
      <div class="modal-box">
        <h2
          style="
            font-size: 1.5rem;
            letter-spacing: 4px;
            margin: 0 0 5px;
            font-weight: 900;
          "
        >
          AI ENGAGEMENT
        </h2>
        <p style="color: var(--dim); font-size: 0.8rem; margin-bottom: 25px">
          Initialize tactical field and AI parameters.
        </p>

        <div class="ident-wrap">
          <label
            class="ident-label"
            style="
              font-size: 0.6rem;
              color: var(--dim);
              font-weight: 800;
              display: block;
              margin-bottom: 10px;
              text-align: center;
            "
            >CHOOSE YOUR UNIT (White moves first)</label
          >
          <div class="color-selection">
            <div
              class="color-button white selected"
              data-color="1"
              id="colorWhite"
            ></div>
            <div
              class="color-button black"
              data-color="2"
              id="colorBlack"
            ></div>
          </div>
        </div>

        <div class="ident-wrap">
          <label
            class="ident-label"
            style="
              font-size: 0.6rem;
              color: var(--dim);
              font-weight: 800;
              display: block;
              margin-bottom: 5px;
            "
            >COMMANDER IDENT</label
          >
          <input
            type="text"
            id="playerName"
            class="ident-input"
            value="Commander"
          />
        </div>

        <div class="ident-wrap">
          <label
            class="ident-label"
            style="
              font-size: 0.6rem;
              color: var(--dim);
              font-weight: 800;
              display: block;
              margin-bottom: 5px;
            "
            >AI PROCESSING DEPTH (1-6)</label
          >
          <input
            type="number"
            id="aiMaxDepth"
            class="ident-input"
            min="1"
            max="6"
            value="2"
          />
        </div>

        <button
          class="btn"
          style="
            width: 100%;
            padding: 18px;
            font-size: 0.8rem;
            border-color: var(--accent);
          "
          id="startGameBtn"
        >
          BEGIN ENGAGEMENT
        </button>
      </div>
    </div>

    <!-- Settlement Popup -->
    <div id="gameOverModal" class="modal">
      <div class="modal-box">
        <div
          style="
            font-size: 0.6rem;
            color: var(--accent);
            letter-spacing: 5px;
            margin-bottom: 5px;
          "
        >
          CONFLICT SETTLED
        </div>
        <h2
          id="goTitle"
          style="font-size: 1.8rem; margin: 15px 0 10px; font-weight: 900"
        >
          VICTORY
        </h2>
        <p
          id="goSubtitle"
          style="color: var(--dim); font-size: 0.85rem; margin-bottom: 25px"
        >
          Tactical objective achieved.
        </p>

        <div
          style="
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
          "
        >
          <div>
            <span style="font-size: 0.6rem; color: var(--dim)" id="goP1Label"
              >PLAYER</span
            >
            <div
              id="goP1Score"
              style="font-size: 1.5rem; color: var(--accent); font-weight: 900"
            >
              0
            </div>
          </div>
          <div>
            <span style="font-size: 0.6rem; color: var(--dim)" id="goP2Label"
              >AI</span
            >
            <div
              id="goP2Score"
              style="font-size: 1.5rem; color: var(--accent); font-weight: 900"
            >
              0
            </div>
          </div>
        </div>

        <button
          class="btn"
          style="width: 100%; margin-bottom: 8px"
          id="playAgainBtn"
        >
          RE-INITIATE
        </button>
        <button
          class="btn"
          style="width: 100%"
          onclick="location.href = 'index.html'"
        >
          EXIT COMMAND
        </button>
      </div>
    </div>

    <div class="app-shell">
      <header class="hdr">
        <h1>MIGOYUGO COMMAND <span class="mv-tag">VS AI</span></h1>
        <div class="target-bar" id="tHdr">Target: <b>--</b></div>
      </header>

      <main class="board-frame">
        <div id="board" class="board"></div>
      </main>

      <aside class="side-cards">
        <div class="stats-wrap">
          <div id="cd1" class="card active">
            <div class="score-box">
              <span class="label" id="labelWhitePoints">WHITE</span>
              <div class="val" id="scoreWhite">0</div>
            </div>
            <div class="status-indicator" id="turnIndicator1">ACTIVE</div>
          </div>

          <div id="cd2" class="card">
            <div class="score-box">
              <span class="label" id="labelBlackPoints">BLACK</span>
              <div class="val" id="scoreBlack">0</div>
            </div>
            <div class="status-indicator" id="turnIndicator2">WAITING</div>
          </div>
        </div>

        <div class="registry">
          <div
            id="log"
            style="
              font-family: monospace;
              font-size: 0.75rem;
              color: var(--accent);
            "
          >
            Initialize systems...
          </div>
        </div>

        <div class="actions">
          <button class="btn" id="undoBtn">Undo</button>
          <button class="btn" id="viewLogBtn">History</button>
          <button class="btn" style="color: var(--danger)" id="resignBtn">
            Resign
          </button>
        </div>
        <button
          class="btn"
          style="margin-top: 10px"
          onclick="location.href = 'index.html'"
        >
          ⌂ BACK TO MENU
        </button>
      </aside>
    </div>

    <div id="logModal" class="modal" onclick="this.classList.remove('show')">
      <div class="modal-box" onclick="event.stopPropagation()">
        <h2 style="font-size: 1rem; margin-bottom: 15px">ACTION MATRIX</h2>
        <div
          id="historyList"
          class="history-list"
          style="
            background: #060912;
            padding: 15px;
            border-radius: 10px;
            max-height: 300px;
            overflow-y: auto;
            text-align: left;
          "
        ></div>
        <button
          class="btn"
          style="width: 100%; margin-top: 15px"
          id="closeLogBtn"
        >
          CLOSE
        </button>
      </div>
    </div>

    <script>
      // --- CONSTANTS ---
      const size = 8;
      const THINK_TIME = 600;
      const aiWorker = new Worker("ai_worker.js");

      // --- DOM ELEMENTS ---
      const boardElement = document.getElementById("board");
      const scoreWhiteElement = document.getElementById("scoreWhite");
      const scoreBlackElement = document.getElementById("scoreBlack");
      const labelWhitePoints = document.getElementById("labelWhitePoints");
      const labelBlackPoints = document.getElementById("labelBlackPoints");
      const logElement = document.getElementById("log");
      const undoBtn = document.getElementById("undoBtn");
      const resignBtn = document.getElementById("resignBtn");
      const colorSelectionModal = document.getElementById(
        "colorSelectionModal",
      );
      const colorButtons = document.querySelectorAll(".color-button");
      const playerNameInput = document.getElementById("playerName");
      const aiMaxDepthInput = document.getElementById("aiMaxDepth");
      const startGameBtn = document.getElementById("startGameBtn");
      const gameOverModal = document.getElementById("gameOverModal");
      const goTitle = document.getElementById("goTitle");
      const goSubtitle = document.getElementById("goSubtitle");
      const goP1Score = document.getElementById("goP1Score");
      const goP2Score = document.getElementById("goP2Score");
      const logModal = document.getElementById("logModal");
      const viewLogBtn = document.getElementById("viewLogBtn");
      const historyList = document.getElementById("historyList");

      // --- GAME STATE ---
      let playerColor = 1;
      let aiMaxDepth = 2;
      const players = {
        1: { name: "White", color: "white" },
        2: { name: "Black", color: "black" },
      };

      const state = {
        board: Array.from({ length: size }, () => Array(size).fill(null)),
        turn: 1,
        gameOver: false,
        gameStarted: false,
        gameMoves: [],
        aiThinking: false,
        undoStack: [], // Stores history for undoing moves
      };

      function playAudio(name) {
        const audio = new Audio(`./assets/sfx/${name}.mp3`);
        audio.play().catch((e) => console.log("Audio pending..."));
      }

      // --- INITIALIZATION ---
      colorButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          colorButtons.forEach((b) => b.classList.remove("selected"));
          btn.classList.add("selected");
          playerColor = parseInt(btn.dataset.color);
        });
      });

      startGameBtn.addEventListener("click", () => {
        const name = playerNameInput.value.trim() || "Commander";
        aiMaxDepth = parseInt(aiMaxDepthInput.value) || 2;
        players[playerColor].name = name;
        players[playerColor === 1 ? 2 : 1].name = "AI UNIT";
        labelWhitePoints.textContent = players[1].name.toUpperCase();
        labelBlackPoints.textContent = players[2].name.toUpperCase();
        colorSelectionModal.classList.remove("show");
        state.gameStarted = true;
        resetGame();
        if (playerColor === 2) {
          pushLog("AI INITIATING FIRST STRIKE...");
          setTimeout(makeAIMove, 1000);
        }
      });

      function buildBoard() {
        boardElement.innerHTML = "";
        for (let row = 0; row < size; row++) {
          for (let col = 0; col < size; col++) {
            const cell = document.createElement("div");
            cell.className = `cell ${(row + col) % 2 === 0 ? "tile-a" : "tile-b"}`;
            cell.dataset.row = row;
            cell.dataset.col = col;
            cell.onclick = () => onCellClick(row, col);
            cell.onmouseenter = () => scout(row, col);
            boardElement.appendChild(cell);
          }
        }
      }

      function scout(r, c) {
        const coords = `${String.fromCharCode(65 + c)}${size - r}`;
        document.getElementById("tHdr").innerHTML = `Target: <b>${coords}</b>`;
      }

      function onCellClick(row, col) {
        if (
          !state.gameStarted ||
          state.gameOver ||
          state.aiThinking ||
          state.turn !== playerColor
        )
          return;
        if (state.board[row][col] || wouldCreateLongLine(row, col, state.turn))
          return;

        // Save current state before player moves
        saveUndoState();
        placeTile(row, col);
      }

      function saveUndoState() {
        state.undoStack.push(
          JSON.stringify({
            board: state.board,
            turn: state.turn,
            gameMoves: state.gameMoves,
          }),
        );
      }

      function placeTile(row, col) {
        const p = state.turn;
        state.board[row][col] = { player: p, yugo: false };
        playAudio(p === 1 ? "white" : "black");

        let notation = `${String.fromCharCode(97 + col)}${size - row}`;
        const lines = findAllStraightLines(row, col, p);

        if (lines.length > 0) {
          playAudio("form");
          lines.flat().forEach(([r, c]) => {
            const cell = document.querySelector(
              `.cell[data-row="${r}"][data-col="${c}"]`,
            );
            if (cell) {
              cell.classList.add("forming");
              setTimeout(() => cell.classList.remove("forming"), 600);
            }
          });
          formYugo(lines, p, { row, col });
          notation += "*";
        }

        state.gameMoves.push(notation);

        if (checkIgo(p)) {
          endGame(p, "TACTICAL IGO ACHIEVED");
        } else {
          state.turn = state.turn === 1 ? 2 : 1;
          render();
          if (isBoardFull()) endGame(null, "FIELD SATURATED");
          if (!state.gameOver && state.turn !== playerColor) {
            // Save state again before AI moves
            saveUndoState();
            setTimeout(makeAIMove, 800);
          }
        }
      }

      function makeAIMove() {
        if (state.gameOver) return;
        state.aiThinking = true;
        logElement.classList.add("ai-thinking");
        aiWorker.postMessage({
          board: state.board,
          playerColor: playerColor,
          turn: state.turn,
          maxDepth: aiMaxDepth,
        });
      }

      aiWorker.onmessage = (e) => {
        const { bestMove } = e.data;
        setTimeout(() => {
          state.aiThinking = false;
          logElement.classList.remove("ai-thinking");
          if (bestMove) placeTile(bestMove.row, bestMove.col);
        }, THINK_TIME);
      };

      function render() {
        const cells = document.querySelectorAll(".cell");
        cells.forEach((cell) => {
          const r = cell.dataset.row;
          const c = cell.dataset.col;
          const tile = state.board[r][c];
          cell.innerHTML = "";
          if (tile) {
            const piece = document.createElement("div");
            piece.className = `piece ${tile.player === 1 ? "white" : "black"} ${tile.yugo ? "yugo" : ""}`;
            cell.appendChild(piece);
          }
        });
        document
          .getElementById("cd1")
          .classList.toggle("active", state.turn === 1);
        document
          .getElementById("cd2")
          .classList.toggle("active", state.turn === 2);
        document.getElementById("turnIndicator1").innerText =
          state.turn === 1 ? "ACTIVE" : "WAITING";
        document.getElementById("turnIndicator2").innerText =
          state.turn === 2 ? "ACTIVE" : "WAITING";
        scoreWhiteElement.innerText = countPoints(1);
        scoreBlackElement.innerText = countPoints(2);
      }

      function pushLog(msg) {
        logElement.innerText = msg;
      }

      function resetGame() {
        state.board = Array.from({ length: size }, () =>
          Array(size).fill(null),
        );
        state.turn = 1;
        state.gameOver = false;
        state.gameMoves = [];
        state.undoStack = [];
        buildBoard();
        render();
      }

      function endGame(winner, reason) {
        state.gameOver = true;
        goTitle.innerText = winner
          ? `${players[winner].name.toUpperCase()} WINS`
          : "DRAW";
        goSubtitle.innerText = reason;
        goP1Score.innerText = countPoints(1);
        goP2Score.innerText = countPoints(2);
        gameOverModal.classList.add("show");
      }

      // --- GAME RULES ---
      function countPoints(p) {
        return state.board.flat().filter((t) => t && t.player === p && t.yugo)
          .length;
      }
      function isBoardFull() {
        return state.board.flat().every((t) => t !== null);
      }
      function inBounds(r, c) {
        return r >= 0 && r < size && c >= 0 && c < size;
      }
      function wouldCreateLongLine(r, c, p) {
        for (let [dr, dc] of [
          [0, 1],
          [1, 0],
          [1, 1],
          [1, -1],
        ]) {
          let count = 1;
          for (let m of [-1, 1]) {
            let nr = r + dr * m,
              nc = c + dc * m;
            while (inBounds(nr, nc) && state.board[nr][nc]?.player === p) {
              count++;
              nr += dr * m;
              nc += dc * m;
            }
          }
          if (count > 4) return true;
        }
        return false;
      }
      function findAllStraightLines(r, c, p) {
        const lines = [];
        for (let [dr, dc] of [
          [0, 1],
          [1, 0],
          [1, 1],
          [1, -1],
        ]) {
          let line = [[r, c]];
          for (let m of [-1, 1]) {
            let nr = r + dr * m,
              nc = c + dc * m;
            while (inBounds(nr, nc) && state.board[nr][nc]?.player === p) {
              line.push([nr, nc]);
              nr += dr * m;
              nc += dc * m;
            }
          }
          if (line.length === 4) lines.push(line);
        }
        return lines;
      }
      function formYugo(lines, p, anchor) {
        lines.flat().forEach(([r, c]) => {
          if (!state.board[r][c].yugo) state.board[r][c] = null;
        });
        state.board[anchor.row][anchor.col] = { player: p, yugo: true };
      }
      function checkIgo(p) {
        const yg = [];
        for (let r = 0; r < size; r++)
          for (let c = 0; c < size; c++)
            if (state.board[r][c]?.player === p && state.board[r][c].yugo)
              yg.push([r, c]);
        for (let [r, c] of yg) {
          for (let [dr, dc] of [
            [0, 1],
            [1, 0],
            [1, 1],
            [1, -1],
          ]) {
            let cnt = 1;
            for (let i = 1; i < 4; i++)
              if (yg.some((y) => y[0] === r + dr * i && y[1] === c + dc * i))
                cnt++;
            if (cnt >= 4) return true;
          }
        }
        return false;
      }

      // --- UI EVENTS ---

      // Fix for the History Close button
      document.getElementById("closeLogBtn").onclick = () =>
        logModal.classList.remove("show");

      undoBtn.onclick = () => {
        if (state.aiThinking || state.undoStack.length < 2) return;
        state.undoStack.pop();
        const previousState = JSON.parse(state.undoStack.pop());

        state.board = previousState.board;
        state.turn = previousState.turn;
        state.gameMoves = previousState.gameMoves;
        render();
        pushLog("TACTICAL ROLLBACK EXECUTED.");
      };

      resignBtn.onclick = () => {
        const aiId = playerColor === 1 ? 2 : 1;
        endGame(aiId, "COMMANDER RETREATED FROM FIELD.");
      };

      document.getElementById("playAgainBtn").onclick = () => {
        gameOverModal.classList.remove("show");
        resetGame();
        if (playerColor === 2) setTimeout(makeAIMove, 1000);
      };

      viewLogBtn.onclick = () => {
        historyList.innerHTML = state.gameMoves
          .map(
            (m, i) =>
              `<div style="margin-bottom:5px"><span style="color:var(--accent)">${i + 1}.</span> ${m.toUpperCase()}</div>`,
          )
          .join("");
        logModal.classList.add("show");
      };

      buildBoard();
    </script>
  </body>
</html>
