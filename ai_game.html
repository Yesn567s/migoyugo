<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Migoyugo - vs AI</title>
    <link rel="stylesheet" href="ai_game.css" />
  </head>
  <body>
    <!-- Color Selection Modal -->
    <div class="modal-backdrop" id="colorSelectionModal">
      <div class="modal-box">
        <h2>Choose Your Color</h2>
        <p>Select which color to play as</p>

        <div class="color-selection">
          <button
            class="color-button white selected"
            data-color="1"
            id="colorWhite"
          ></button>
          <button
            class="color-button black"
            data-color="2"
            id="colorBlack"
          ></button>
        </div>

        <div class="input-group">
          <label for="playerName">Your Name</label>
          <input
            type="text"
            id="playerName"
            placeholder="Enter your name"
            value="Player"
          />
        </div>

        <div class="input-group">
          <label for="aiMaxDepth">AI Max Depth</label>
          <input
            type="number"
            id="aiMaxDepth"
            min="1"
            max="8"
            step="1"
            value="2"
          />
        </div>

        <button
          class="action"
          style="width: 100%; padding: 14px; font-size: 1.1rem"
          id="startGameBtn"
        >
          Start Game
        </button>
      </div>
    </div>

    <!-- Game Over Modal -->
    <div class="modal-backdrop hidden" id="gameOverModal">
      <div class="modal-box" style="position: relative">
        <button
          id="closeGameOverBtn"
          style="
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 28px;
            color: #888;
            cursor: pointer;
            padding: 5px;
            line-height: 1;
            transition: color 0.2s;
          "
          onmouseover="this.style.color = '#fff'"
          onmouseout="this.style.color = '#888'"
        >
          &times;
        </button>
        <h2
          id="goTitle"
          class="winner-text"
          style="font-size: 2.2rem; margin-bottom: 4px"
        >
          You Won!
        </h2>
        <p id="goSubtitle" style="font-size: 1.1rem; color: #fff">
          Congratulations!
        </p>

        <div class="stats" style="margin-bottom: 24px; margin-top: 10px">
          <div class="stat">
            <span class="label" id="goP1Label">Your Score</span>
            <span class="value" id="goP1Score">0</span>
          </div>
          <div class="stat">
            <span class="label" id="goP2Label">AI Score</span>
            <span class="value" id="goP2Score">0</span>
          </div>
        </div>

        <button
          class="action"
          id="playAgainBtn"
          style="width: 100%; padding: 14px; font-size: 1.1rem"
        >
          Play Again
        </button>
        <a
          href="index.html"
          class="action secondary"
          style="
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            margin-top: 10px;
            text-decoration: none;
            display: block;
          "
        >
          Back to Menu
        </a>
      </div>
    </div>

    <!-- Move History Log Modal -->
    <div class="modal-backdrop hidden" id="logModal">
      <div class="modal-box" id="logModalBox">
        <div class="modal-header-row">
          <h2>Move History</h2>
          <button class="close-btn" id="closeLogBtn">&times;</button>
        </div>
        <div class="history-list" id="historyList"></div>
      </div>
    </div>

    <!-- Main Game Area -->
    <div class="shell">
      <div class="hero">
        <div class="title-block">
          <h1>Migoyugo</h1>
          <p>vs AI - Strategic Board Game</p>
        </div>
        <div class="chip-row">
          <a
            href="index.html"
            class="chip menu-link"
            style="
              text-decoration: none;
              display: flex;
              align-items: center;
              gap: 6px;
            "
          >
            <span>&larr;</span> Main Menu
          </a>
          <div class="chip">Gamemode: vs AI</div>
        </div>
      </div>

      <div class="grid-layout">
        <section class="panel side">
          <div class="status-card">
            <div class="status-label">Current Turn</div>
            <div class="turn-banner">
              <span class="turn-name" id="turnName">Player</span>
              <div class="turn-dot" id="turnDot"></div>
            </div>
          </div>

          <div class="status-card">
            <div class="status-label">Yugos</div>
            <div class="stats">
              <div class="stat">
                <span class="label" id="labelWhitePoints">White</span>
                <span class="value" id="scoreWhite">0</span>
              </div>
              <div class="stat">
                <span class="label" id="labelBlackPoints">Black</span>
                <span class="value" id="scoreBlack">0</span>
              </div>
            </div>
          </div>

          <div class="log" id="log">Game started. White moves first.</div>

          <div class="footer-row">
            <div class="actions">
              <button class="action" id="restartBtn">Restart</button>
              <button class="action secondary" id="viewLogBtn">Move Log</button>
            </div>
          </div>
        </section>

        <section class="panel board-wrap">
          <div class="board-shell">
            <div class="board" id="board"></div>
            <div class="board-file-labels" id="boardFileLabels"></div>
            <div class="board-rank-labels" id="boardRankLabels"></div>
          </div>
        </section>
      </div>
    </div>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
      <div class="spinner"></div>
      <div class="loading-text">Loading...</div>
    </div>

    <script>
      const size = 8;
      const MAX_DEPTH = 4; // Depth for minimax algorithm
      const THINK_TIME = 500; // Minimum time for AI to "think" in ms

      // Initialize AI Worker
      const aiWorker = new Worker("ai_worker.js");

      const boardElement = document.getElementById("board");
      const boardFileLabelsElement = document.getElementById("boardFileLabels");
      const boardRankLabelsElement = document.getElementById("boardRankLabels");
      const turnNameElement = document.getElementById("turnName");
      const turnDotElement = document.getElementById("turnDot");
      const scoreWhiteElement = document.getElementById("scoreWhite");
      const scoreBlackElement = document.getElementById("scoreBlack");
      const labelWhitePoints = document.getElementById("labelWhitePoints");
      const labelBlackPoints = document.getElementById("labelBlackPoints");
      const logElement = document.getElementById("log");
      const restartBtn = document.getElementById("restartBtn");

      // Modal Elements
      const colorSelectionModal = document.getElementById(
        "colorSelectionModal",
      );
      const colorButtons = document.querySelectorAll(".color-button");
      const playerNameInput = document.getElementById("playerName");
      const aiMaxDepthInput = document.getElementById("aiMaxDepth");
      const startGameBtn = document.getElementById("startGameBtn");
      const colorWhiteBtn = document.getElementById("colorWhite");
      const colorBlackBtn = document.getElementById("colorBlack");

      const gameOverModal = document.getElementById("gameOverModal");
      const goTitle = document.getElementById("goTitle");
      const goSubtitle = document.getElementById("goSubtitle");
      const goP1Label = document.getElementById("goP1Label");
      const goP2Label = document.getElementById("goP2Label");
      const goP1Score = document.getElementById("goP1Score");
      const goP2Score = document.getElementById("goP2Score");
      const playAgainBtn = document.getElementById("playAgainBtn");
      const closeGameOverBtn = document.getElementById("closeGameOverBtn");

      const logModal = document.getElementById("logModal");
      const viewLogBtn = document.getElementById("viewLogBtn");
      const closeLogBtn = document.getElementById("closeLogBtn");
      const historyList = document.getElementById("historyList");

      let playerColor = 1; // 1 = white, 2 = black
      let aiMaxDepth = 4;
      const players = {
        1: { name: "Player", color: "white", label: "white" },
        2: { name: "AI", color: "black", label: "black" },
      };

      // Sound Effects
      function playSound(filename) {
        const audio = new Audio(`assets/sfx/${filename}`);
        audio.volume = 0.3;
        audio.play().catch((e) => console.log("Sound play error:", e));
      }

      const state = {
        board: createEmptyBoard(),
        turn: 1,
        gameOver: false,
        winner: null,
        gameStarted: false,
        moveHistory: [],
        gameMoves: [],
        moveCount: 0,
        aiThinking: false,
      };

      // ==================== COLOR SELECTION ====================
      colorButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          colorButtons.forEach((b) => b.classList.remove("selected"));
          btn.classList.add("selected");
          playerColor = parseInt(btn.dataset.color);
        });
      });

      startGameBtn.addEventListener("click", () => {
        const name = playerNameInput.value.trim() || "Player";
        const depthValue = Number.parseInt(aiMaxDepthInput.value, 10);
        aiMaxDepth = Number.isFinite(depthValue)
          ? Math.min(6, Math.max(1, depthValue))
          : 4;
        players[playerColor].name = name;
        const aiColor = playerColor === 1 ? 2 : 1;
        players[aiColor].name = "AI";

        labelWhitePoints.textContent = `${players[1].name}`;
        labelBlackPoints.textContent = `${players[2].name}`;

        colorSelectionModal.classList.add("hidden");
        state.gameStarted = true;

        resetGame();

        // If AI is white (moves first), trigger AI move
        if (state.turn !== playerColor) {
          setTimeout(makeAIMove, 800);
        }
      });

      playerNameInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") startGameBtn.click();
      });

      playAgainBtn.addEventListener("click", () => {
        gameOverModal.classList.add("hidden");
        resetGame();
      });

      closeGameOverBtn.addEventListener("click", () => {
        gameOverModal.classList.add("hidden");
      });

      viewLogBtn.addEventListener("click", () => {
        renderHistoryList();
        logModal.classList.remove("hidden");
      });

      closeLogBtn.addEventListener("click", () =>
        logModal.classList.add("hidden"),
      );

      logModal.addEventListener("click", (e) => {
        if (e.target === logModal) logModal.classList.add("hidden");
      });

      // ==================== GAME LOGIC ====================
      function createEmptyBoard() {
        return Array.from({ length: size }, () => Array(size).fill(null));
      }

      function buildBoardEdgeLabels() {
        boardFileLabelsElement.innerHTML = "";
        boardRankLabelsElement.innerHTML = "";
        for (let col = 0; col < size; col += 1) {
          const label = document.createElement("div");
          label.className = "coord-label";
          label.textContent = String.fromCharCode(65 + col);
          boardFileLabelsElement.appendChild(label);
        }
        for (let row = 0; row < size; row += 1) {
          const label = document.createElement("div");
          label.className = "coord-label";
          label.textContent = String(size - row);
          boardRankLabelsElement.appendChild(label);
        }
      }

      function buildBoard() {
        boardElement.innerHTML = "";
        buildBoardEdgeLabels();
        for (let row = 0; row < size; row += 1) {
          for (let col = 0; col < size; col += 1) {
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.dataset.row = row;
            cell.dataset.col = col;
            cell.addEventListener("click", onCellClick);
            boardElement.appendChild(cell);
          }
        }
      }

      function onCellClick(event) {
        if (!state.gameStarted || state.gameOver || state.aiThinking) return;
        if (state.turn !== playerColor) return;

        const cell = event.currentTarget;
        const row = Number(cell.dataset.row);
        const col = Number(cell.dataset.col);

        if (state.board[row][col]) {
          pushLog("That square is occupied!");
          cell.classList.add("error");
          setTimeout(() => cell.classList.remove("error"), 300);
          return;
        }

        if (wouldCreateLongLine(row, col, state.turn)) {
          pushLog("Cannot create a line longer than 4!");
          cell.classList.add("error");
          setTimeout(() => cell.classList.remove("error"), 300);
          return;
        }

        placeTile(row, col);

        // Trigger AI move after a brief delay
        if (!state.gameOver && state.turn !== playerColor) {
          setTimeout(makeAIMove, 800);
        }
      }

      function placeTile(row, col) {
        const player = state.turn;
        state.board[row][col] = { player, yugo: false };

        let notation = `${String.fromCharCode(97 + col)}${size - row}`;

        pushLog(`${players[player].name} placed at ${cellName(row, col)}`);

        playSound(`${players[player].color}.mp3`);

        const lines = findAllStraightLines(row, col, player);
        if (lines.length > 0) {
          formYugo(lines, player, { row, col });
          notation += "*".repeat(lines.length);
          pushLog(
            `${players[player].name} formed a Yugo at ${cellName(row, col)}!`,
            true,
          );
        }

        state.gameMoves.push(notation);

        if (checkIgo(player)) {
          state.gameOver = true;
          state.winner = player;
          showGameOver(player, `${players[player].name} achieved an Igo!`);
          return;
        }

        state.turn = state.turn === 1 ? 2 : 1;

        const boardFull = isBoardFull();
        const noMoves = !hasLegalMoves(state.turn);

        if (boardFull || noMoves) {
          const result = evaluateWego(
            boardFull
              ? "Board filled - Wego"
              : `${players[state.turn].name} has no legal moves - Wego`,
          );
          state.gameOver = true;
          state.winner = result.winner;
          showGameOver(result.winner, result.message);
          return;
        }

        render();
      }

      function inBounds(row, col) {
        return row >= 0 && row < size && col >= 0 && col < size;
      }

      function isPlayerCell(row, col, player) {
        const tile = state.board[row][col];
        return tile && tile.player === player;
      }

      function cellName(row, col) {
        return `${String.fromCharCode(65 + col)}${size - row}`;
      }

      function wouldCreateLongLine(row, col, player) {
        const directions = [
          [0, 1],
          [1, 0],
          [1, 1],
          [1, -1],
        ];

        for (const [dr, dc] of directions) {
          let count = 1;
          for (let i = 1; i < 8; i++) {
            const nr = row + i * dr;
            const nc = col + i * dc;
            if (!inBounds(nr, nc) || !isPlayerCell(nr, nc, player)) break;
            count++;
          }
          for (let i = 1; i < 8; i++) {
            const nr = row - i * dr;
            const nc = col - i * dc;
            if (!inBounds(nr, nc) || !isPlayerCell(nr, nc, player)) break;
            count++;
          }
          if (count > 4) return true;
        }
        return false;
      }

      function hasLegalMoves(player) {
        for (let r = 0; r < size; r++) {
          for (let c = 0; c < size; c++) {
            if (!state.board[r][c] && !wouldCreateLongLine(r, c, player)) {
              return true;
            }
          }
        }
        return false;
      }

      function findAllStraightLines(row, col, player) {
        const directions = [
          [0, 1],
          [1, 0],
          [1, 1],
          [1, -1],
        ];
        const validLines = [];

        for (const [dr, dc] of directions) {
          const line = [[row, col]];
          for (let i = 1; i < 4; i++) {
            const nr = row + i * dr;
            const nc = col + i * dc;
            if (!inBounds(nr, nc) || !isPlayerCell(nr, nc, player)) break;
            line.push([nr, nc]);
          }
          for (let i = 1; i < 4; i++) {
            const nr = row - i * dr;
            const nc = col - i * dc;
            if (!inBounds(nr, nc) || !isPlayerCell(nr, nc, player)) break;
            line.unshift([nr, nc]);
          }

          if (line.length === 4) {
            validLines.push(line);
          }
        }
        return validLines;
      }

      function formYugo(lines, player, anchor) {
        const tilesToRemove = new Set();
        const existingYugos = []; // track Yugos already on the board within this line

        for (const line of lines) {
          for (const [r, c] of line) {
            tilesToRemove.add(`${r}:${c}`);
            const tile = state.board[r][c];
            if (tile && tile.yugo) {
              existingYugos.push({ r, c }); // remember their positions
            }
          }
        }

        // Clear all tiles in the line
        for (const key of tilesToRemove) {
          const [r, c] = key.split(":").map(Number);
          state.board[r][c] = null;
        }

        // Restore previously existing Yugos
        for (const { r, c } of existingYugos) {
          state.board[r][c] = { player, yugo: true };
        }

        // Place the new Yugo at the anchor
        state.board[anchor.row][anchor.col] = { player, yugo: true };
      }

      function checkIgo(player) {
        const yugos = [];
        for (let row = 0; row < size; row += 1) {
          for (let col = 0; col < size; col += 1) {
            const tile = state.board[row][col];
            if (tile && tile.player === player && tile.yugo) {
              yugos.push([row, col]);
            }
          }
        }
        const yugoSet = new Set(yugos.map(([row, col]) => `${row}:${col}`));

        for (const [row, col] of yugos) {
          const directions = [
            [0, 1],
            [1, 0],
            [1, 1],
            [1, -1],
          ];
          for (const [dr, dc] of directions) {
            let count = 1;
            for (let i = 1; i < 4; i++) {
              const nr = row + i * dr;
              const nc = col + i * dc;
              if (!inBounds(nr, nc) || !yugoSet.has(`${nr}:${nc}`)) break;
              count++;
            }
            for (let i = 1; i < 4; i++) {
              const nr = row - i * dr;
              const nc = col - i * dc;
              if (!inBounds(nr, nc) || !yugoSet.has(`${nr}:${nc}`)) break;
              count++;
            }
            if (count === 4) return true;
          }
        }
        return false;
      }

      function isBoardFull() {
        for (let row = 0; row < size; row += 1) {
          for (let col = 0; col < size; col += 1) {
            if (!state.board[row][col]) return false;
          }
        }
        return true;
      }

      function evaluateWego(reasonMessage) {
        const white = countPlayerPoints(1);
        const black = countPlayerPoints(2);

        if (white === black) {
          return { winner: null, message: "Draw! " + reasonMessage };
        }
        const winner = white > black ? 1 : 2;
        return {
          winner,
          message: `${players[winner].name} wins with Wego! ` + reasonMessage,
        };
      }

      function countPlayerPoints(player) {
        let count = 0;
        for (let row = 0; row < size; row += 1) {
          for (let col = 0; col < size; col += 1) {
            const tile = state.board[row][col];
            if (tile && tile.player === player && tile.yugo) count++;
          }
        }
        return count;
      }

      function pushLog(message, isImportant = false) {
        logElement.textContent = message;

        if (
          message.includes("Invalid") ||
          message.includes("occupied") ||
          message.includes("Cannot")
        ) {
          logElement.style.color = "var(--danger)";
        } else {
          logElement.style.color = "#dce6ff";
        }
        // We removed the array pushing from here completely!
      }

      function renderHistoryList() {
        historyList.innerHTML = "";
        if (state.gameMoves.length === 0) {
          historyList.innerHTML =
            '<div style="color: var(--muted);">No moves yet</div>';
          return;
        }

        // Loop through moves in pairs of 2 (White, then Black)
        for (let i = 0; i < state.gameMoves.length; i += 2) {
          const turnNum = Math.floor(i / 2) + 1;
          const whiteMove = state.gameMoves[i];
          const blackMove = state.gameMoves[i + 1] || ""; // Might be empty if game ends on White's turn

          const turnBlock = document.createElement("div");
          turnBlock.style.marginBottom = "10px";
          turnBlock.style.fontFamily = "monospace";
          turnBlock.style.fontSize = "1.2rem";
          turnBlock.style.lineHeight = "1.4";

          // Format it exactly like the professional logs
          turnBlock.innerHTML = `
            <div style="color: #888;">${turnNum}.</div>
            <div style="color: #fff;">${whiteMove}</div>
            ${blackMove ? `<div style="color: #fff;">${blackMove}</div>` : ""}
          `;
          historyList.appendChild(turnBlock);
        }

        historyList.scrollTop = historyList.scrollHeight;
      }

      function showGameOver(winnerId, subtitleMsg) {
        if (winnerId === null) {
          goTitle.textContent = "Draw!";
          goTitle.style.webkitTextFillColor = "var(--text)";
        } else {
          goTitle.textContent = `${players[winnerId].name} Wins!`;
          goTitle.style.webkitTextFillColor = "transparent";
        }

        goSubtitle.textContent = subtitleMsg;
        goP1Label.textContent = `${players[1].name} Yugos`;
        goP2Label.textContent = `${players[2].name} Yugos`;
        goP1Score.textContent = countPlayerPoints(1);
        goP2Score.textContent = countPlayerPoints(2);

        gameOverModal.classList.remove("hidden");
      }

      function render() {
        turnNameElement.textContent = players[state.turn].name;
        turnDotElement.className = `turn-dot ${players[state.turn].color}`;
        scoreWhiteElement.textContent = countPlayerPoints(1);
        scoreBlackElement.textContent = countPlayerPoints(2);

        boardElement.innerHTML = "";
        for (let row = 0; row < size; row += 1) {
          for (let col = 0; col < size; col += 1) {
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.dataset.row = row;
            cell.dataset.col = col;

            if (state.turn === state.turn && state.gameStarted) {
              cell.addEventListener("click", onCellClick);
            }

            const tile = state.board[row][col];
            if (tile) {
              const piece = document.createElement("div");
              piece.className = `piece ${tile.player === 1 ? "white" : "black"} ${tile.yugo ? "yugo" : "circle"}`;

              if (tile.yugo) {
                const dot = document.createElement("div");
                dot.className = "inner-dot";
                piece.appendChild(dot);
              }

              piece.classList.add("place-animation");
              cell.appendChild(piece);
            }

            cell.addEventListener("click", onCellClick);
            boardElement.appendChild(cell);
          }
        }
      }

      function resetGame() {
        state.board = createEmptyBoard();
        state.turn = 1;
        state.gameOver = false;
        state.winner = null;
        state.moveHistory = [];
        state.gameMoves = [];
        state.moveCount = 0;
        state.aiThinking = false;
        pushLog("Game restarted. White moves first.");
        buildBoard();
        render();
      }

      // ==================== AI LOGIC - MINIMAX ====================

      let startTime;

      function makeAIMove() {
        if (state.aiThinking || state.gameOver) return;
        state.aiThinking = true;
        pushLog("AI is thinking...");
        logElement.classList.add("ai-thinking");

        startTime = Date.now();

        // Check for legal moves first (quick check)
        const hasLegalMovesForAI = hasLegalMoves(state.turn);

        if (!hasLegalMovesForAI) {
          // No legal moves - trigger Wego
          const result = evaluateWego(
            `${players[state.turn].name} has no legal moves - Wego`,
          );
          state.gameOver = true;
          state.winner = result.winner;
          state.aiThinking = false;
          logElement.classList.remove("ai-thinking");
          showGameOver(result.winner, result.message);
          return;
        }

        // Send board to worker for minimax computation
        aiWorker.postMessage({
          board: state.board,
          playerColor: playerColor,
          turn: state.turn,
          maxDepth: aiMaxDepth,
        });
      }

      // Handle AI Worker response
      aiWorker.onmessage = function (e) {
        const { bestMove, error } = e.data;

        if (error === "noMoves") {
          // This shouldn't happen since we checked above, but handle it
          const result = evaluateWego(
            `${players[state.turn].name} has no legal moves - Wego`,
          );
          state.gameOver = true;
          state.winner = result.winner;
          state.aiThinking = false;
          logElement.classList.remove("ai-thinking");
          showGameOver(result.winner, result.message);
          return;
        }

        // Ensure minimum think time for better UX
        const elapsedTime = Date.now() - startTime;
        const delayNeeded = Math.max(0, THINK_TIME - elapsedTime);

        setTimeout(() => {
          placeTile(bestMove.row, bestMove.col);
          state.aiThinking = false;
          logElement.classList.remove("ai-thinking");

          if (!state.gameOver && state.turn === playerColor) {
            pushLog(`${players[playerColor].name}, it's your turn!`);
          }
        }, delayNeeded);
      };

      restartBtn.addEventListener("click", resetGame);

      // Initialize
      buildBoard();
      render();
    </script>
  </body>
</html>
