<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Migoyugo - Tactical Command</title>
    <style>
      :root {
        --bg: #060912;
        --panel: rgba(13, 20, 38, 0.95);
        --accent: #7dd3fc;
        --accent-glow: rgba(125, 211, 252, 0.3);
        --border: rgba(125, 211, 252, 0.2);
        --text: #f8fafc;
        --dim: #64748b;
        --danger: #f87171;
        --success: #4ade80;
        --t-a: url("assets/img/wood1.png");
        --t-b: url("assets/img/wood2.jpg");
      }

      * {
        box-sizing: border-box;
        font-family: "Inter", system-ui, sans-serif;
        cursor: default;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at center, #111827 0%, #060912 100%);
        display: flex;
        justify-content: center;
        align-items: flex-start;
        color: var(--text);
        overflow-x: hidden;
        overflow-y: auto;
        padding: 10px;
      }

      .app-shell {
        width: 100%;
        max-width: 1140px;
        display: grid;
        grid-template-columns: 1fr 370px;
        gap: 20px;
        margin: 0 auto;
      }

      /* Responsive Layout: Single column for tablets/mobile */
      @media (max-width: 1000px) {
        .app-shell {
          grid-template-columns: 1fr;
          padding: 10px;
          gap: 15px;
        }
        body {
          align-items: flex-start;
        }
      }

      /* HEADER */
      .hdr {
        grid-column: 1 / -1;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border);
        padding-bottom: 12px;
        flex-wrap: wrap;
        gap: 10px;
      }
      .hdr h1 {
        margin: 0;
        font-size: 1rem;
        letter-spacing: 2px;
        font-weight: 900;
        text-transform: uppercase;
      }
      .target-bar {
        font-size: 0.75rem;
        color: var(--dim);
      }
      .target-bar b {
        color: #fff;
        background: rgba(255, 255, 255, 0.1);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: monospace;
      }
      .mv-tag {
        color: var(--accent);
        border: 1px solid var(--accent);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.6rem;
        margin-left: 5px;
        font-weight: 800;
      }

      /* BOARD FRAME */
      .board-frame {
        background: var(--panel);
        border: 1px solid var(--border);
        padding: clamp(10px, 3vw, 30px);
        border-radius: 12px;
        width: 100%;
        display: flex;
        justify-content: center;
      }
      .board {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 2px;
        aspect-ratio: 1;
        background: var(--border);
        width: 100%;
        max-width: 700px;
      }
      .cell {
        position: relative;
        cursor: pointer;
        background-size: cover;
        transition: background 0.2s;
      }
      .cell.tile-a {
        background-image: var(--t-a);
      }
      .cell.tile-b {
        background-image: var(--t-b);
      }

      @media (hover: hover) {
        .cell:hover {
          filter: brightness(1.6);
          outline: 2px solid var(--accent);
          z-index: 10;
        }
      }

      .piece {
        position: absolute;
        inset: 15%;
        border-radius: 50%;
        z-index: 5;
        transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .piece.white {
        background: radial-gradient(circle at 35% 35%, #fff, #94a3b8);
        box-shadow:
          0 4px 10px rgba(0, 0, 0, 0.5),
          0 0 10px rgba(255, 255, 255, 0.2);
      }
      .piece.black {
        background: radial-gradient(circle at 35% 35%, #475569, #020617);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.8);
      }
      .piece.yugo::after {
        content: "";
        position: absolute;
        inset: 35%;
        background: #ef4444;
        border-radius: 50%;
        box-shadow: 0 0 10px #ef4444;
      }

      /* SIDEBAR CARDS */
      .side-cards {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      @media (max-width: 1000px) {
        .side-cards {
          display: grid;
          grid-template-columns: 1fr 1fr;
        }
        .stats-wrap {
          grid-column: span 2;
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 10px;
        }
        .registry {
          height: 120px !important;
        }
        .full-mat-btn {
          grid-column: span 1;
        }
        .actions-group {
          grid-column: span 2;
        }
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        transition: 0.3s;
      }
      .card.active {
        border-color: var(--accent);
        background: rgba(125, 211, 252, 0.05);
        box-shadow: 0 0 20px rgba(125, 211, 252, 0.08);
      }
      .score-box .label {
        font-size: 0.6rem;
        color: var(--dim);
        letter-spacing: 1px;
      }
      .score-box .val {
        font-size: 1.6rem;
        font-weight: 900;
        color: var(--accent);
      }
      .chrono-time {
        font-family: monospace;
        font-size: 1.2rem;
        text-align: right;
      }

      .registry {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border);
        border-radius: 12px;
        height: 180px;
        overflow-y: auto;
        padding: 15px;
      }
      .reg-row {
        display: grid;
        grid-template-columns: 35px 1fr 1fr;
        font-family: monospace;
        font-size: 0.75rem;
        padding: 5px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      }
      .reg-num {
        color: var(--accent);
        font-weight: 800;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border);
        color: #fff;
        border-radius: 6px;
        padding: 12px 5px;
        font-size: 0.6rem;
        font-weight: 800;
        text-transform: uppercase;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn:hover:not(:disabled) {
        background: var(--accent);
        color: #000;
      }
      .btn:active {
        transform: scale(0.96);
      }

      /* MODALS RESPONSIVENESS */
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 12, 0.95);
        z-index: 999;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(15px);
        visibility: hidden;
        opacity: 0;
        padding: 15px;
      }
      .modal.show {
        visibility: visible;
        opacity: 1;
      }
      .modal-box {
        background: #0f172a;
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: clamp(20px, 5vw, 40px);
        width: 100%;
        max-width: 450px;
        text-align: center;
        position: relative;
        max-height: 90vh;
        overflow-y: auto;
      }

      .ident-wrap {
        margin-bottom: 20px;
        padding-left: 45px;
        position: relative;
        text-align: left;
      }
      .ident-pip {
        position: absolute;
        left: 10px;
        top: 35px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }
      .ident-pip.w {
        background: #fff;
        box-shadow: 0 0 10px white;
      }
      .ident-pip.b {
        background: #2a3442;
        border: 1px solid #4a5568;
      }
      .ident-input {
        width: 100%;
        background: #060912;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 15px;
        color: #fff;
        outline: none;
      }

      @keyframes fBlast {
        50% {
          transform: scale(1.2);
          filter: brightness(2);
          box-shadow: 0 0 30px var(--accent);
        }
      }
      .forming {
        animation: fBlast 0.5s ease;
      }
    </style>
  </head>
  <body>
    <!-- Identities Input -->
    <div id="modIdent" class="modal show">
      <div class="modal-box">
        <h2
          style="
            font-size: 1.5rem;
            letter-spacing: 4px;
            margin: 0 0 5px;
            font-weight: 900;
          "
        >
          IDENTITIES
        </h2>
        <p style="color: var(--dim); font-size: 0.8rem; margin-bottom: 25px">
          Initialize tactical field units.
        </p>

        <div class="ident-wrap">
          <div class="ident-pip w"></div>
          <label
            class="ident-label"
            style="
              font-size: 0.6rem;
              color: var(--dim);
              font-weight: 800;
              display: block;
              margin-bottom: 5px;
            "
            >P1 / WHITE</label
          >
          <input type="text" id="p1i" class="ident-input" value="Commander A" />
        </div>

        <div class="ident-wrap">
          <div class="ident-pip b"></div>
          <label
            class="ident-label"
            style="
              font-size: 0.6rem;
              color: var(--dim);
              font-weight: 800;
              display: block;
              margin-bottom: 5px;
            "
            >P2 / BLACK</label
          >
          <input type="text" id="p2i" class="ident-input" value="Commander B" />
        </div>

        <button
          class="btn"
          style="
            width: 100%;
            padding: 18px;
            font-size: 0.8rem;
            border-color: var(--accent);
          "
          onclick="initialize()"
        >
          BEGIN ENGAGEMENT
        </button>
      </div>
    </div>

    <!-- Settlement Popup -->
    <div id="modVic" class="modal">
      <div class="modal-box">
        <div
          style="
            font-size: 0.6rem;
            color: var(--accent);
            letter-spacing: 5px;
            margin-bottom: 5px;
          "
        >
          CONFLICT SETTLED
        </div>
        <h2
          id="winTag"
          style="font-size: 1.8rem; margin: 15px 0 10px; font-weight: 900"
        >
          WHITE VICTORY
        </h2>
        <p
          id="winWhy"
          style="color: var(--dim); font-size: 0.85rem; margin-bottom: 25px"
        >
          Tactical objective achieved.
        </p>

        <div
          style="
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
          "
        >
          <div>
            <span style="font-size: 0.6rem; color: var(--dim)" id="vs1"
              >P1</span
            >
            <div
              id="fS1"
              style="font-size: 1.5rem; color: var(--accent); font-weight: 900"
            >
              0
            </div>
          </div>
          <div>
            <span style="font-size: 0.6rem; color: var(--dim)" id="vs2"
              >P2</span
            >
            <div
              id="fS2"
              style="font-size: 1.5rem; color: var(--accent); font-weight: 900"
            >
              0
            </div>
          </div>
        </div>

        <button
          class="btn"
          style="width: 100%; margin-bottom: 8px"
          onclick="location.reload()"
        >
          RE-INITIATE
        </button>
        <button
          class="btn"
          style="width: 100%"
          onclick="location.href = 'index.html'"
        >
          EXIT COMMAND
        </button>
      </div>
    </div>

    <div class="app-shell">
      <header class="hdr">
        <h1>MIGOYUGO COMMAND <span class="mv-tag" id="tagM">#1</span></h1>
        <div class="target-bar" id="tHdr">Target: <b>--</b></div>
      </header>

      <main class="board-frame">
        <div id="grid" class="board"></div>
      </main>

      <aside class="side-cards">
        <div class="stats-wrap">
          <div id="cd1" class="card active">
            <div class="score-box">
              <span class="label" id="nm1">P1</span>
              <div class="val" id="sDisp1">0</div>
            </div>
            <div class="chrono">
              <div id="tm1" class="chrono-time">00:00</div>
            </div>
          </div>

          <div id="cd2" class="card">
            <div class="score-box">
              <span class="label" id="nm2">P2</span>
              <div class="val" id="sDisp2">0</div>
            </div>
            <div class="chrono">
              <div id="tm2" class="chrono-time">00:00</div>
            </div>
          </div>
        </div>

        <div class="registry" id="logP">
          <div id="logArea"></div>
        </div>

        <button class="btn full-mat-btn" onclick="toggleMatrix(true)">
          SYSTEM LOGS
        </button>

        <div class="actions actions-group">
          <button class="btn" id="btnU">Undo</button>
          <button class="btn" id="btnR">Reset</button>
          <button
            class="btn btn-resign"
            onclick="forceSurrender()"
            style="color: var(--danger)"
          >
            Resign
          </button>
        </div>

        <button
          class="btn"
          style="margin-top: 10px; grid-column: span 2"
          onclick="location.href = 'index.html'"
        >
          ⌂ BACK TO MENU
        </button>
      </aside>
    </div>

    <!-- Hidden Logs for responsiveness -->
    <div id="modMat" class="modal" onclick="toggleMatrix(false)">
      <div class="modal-box" onclick="event.stopPropagation()">
        <h2 style="font-size: 1rem; margin-bottom: 15px">FULL ACTION MATRIX</h2>
        <div
          id="matrixContainer"
          style="
            background: #060912;
            text-align: left;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            font-size: 0.8rem;
            border: 1px solid var(--border);
          "
        ></div>
      </div>
    </div>

    <script>
      const gameSize = 8;
      const game = {
        board: Array.from({ length: gameSize }, () =>
          Array(gameSize).fill(null),
        ),
        turn: 1,
        players: {
          1: { n: "Player 1", col: "white" },
          2: { n: "Player 2", col: "black" },
        },
        moves: [],
        undoStack: [],
        timers: [0, 0],
        active: false,
        over: false,
      };

      function playAudio(name) {
        const audio = new Audio(`./assets/sfx/${name}.mp3`);
        audio
          .play()
          .catch((e) => console.log("Audio waiting for interaction..."));
      }

      function initialize() {
        game.players[1].n =
          document.getElementById("p1i").value.trim() || "Player 1";
        game.players[2].n =
          document.getElementById("p2i").value.trim() || "Player 2";
        document.getElementById("nm1").innerText = game.players[1].n;
        document.getElementById("nm2").innerText = game.players[2].n;
        document.getElementById("modIdent").classList.remove("show");
        render();
        game.active = true;
        setInterval(() => {
          if (!game.active || game.over) return;
          game.timers[game.turn - 1]++;
          syncChronos();
        }, 1000);
      }

      function syncChronos() {
        const fmt = (s) =>
          `${Math.floor(s / 60)
            .toString()
            .padStart(2, "0")}:${(s % 60).toString().padStart(2, "0")}`;
        document.getElementById("tm1").innerText = fmt(game.timers[0]);
        document.getElementById("tm2").innerText = fmt(game.timers[1]);
      }

      function render() {
        const board = document.getElementById("grid");
        board.innerHTML = "";
        for (let r = 0; r < gameSize; r++) {
          for (let c = 0; c < gameSize; c++) {
            const cell = document.createElement("div");
            cell.className = `cell ${(r + c) % 2 === 0 ? "tile-a" : "tile-b"}`;
            cell.onclick = () => engage(r, c);
            cell.onmouseenter = () => scout(r, c);
            cell.dataset.r = r;
            cell.dataset.c = c;
            board.appendChild(cell);
          }
        }
        updateInterface();
      }

      function scout(r, c) {
        if (game.over) return;
        const coords = `${String.fromCharCode(97 + c)}${8 - r}`;
        document.getElementById("tHdr").innerHTML = `Target: <b>${coords}</b>`;
      }

      function engage(r, c) {
        if (game.over || game.board[r][c] || lineCheck(r, c, game.turn)) return;

        game.undoStack.push(
          JSON.parse(JSON.stringify({ b: game.board, t: game.turn })),
        );
        game.moves.push(`${String.fromCharCode(97 + c)}${8 - r}`);

        game.board[r][c] = { p: game.turn, y: false };

        playAudio(game.turn === 1 ? "white" : "black");

        const found = scanYugo(r, c, game.turn);
        if (found.length > 0) {
          playAudio("form");

          found.forEach((l) =>
            l.forEach(([rr, cc]) => {
              if (!game.board[rr][cc].y) game.board[rr][cc] = null;
              document
                .querySelector(`.cell[data-r="${rr}"][data-c="${cc}"]`)
                .classList.add("forming");
            }),
          );
          game.board[r][c] = { p: game.turn, y: true, stacks: found.length };
          setTimeout(
            () =>
              document
                .querySelectorAll(".cell")
                .forEach((c) => c.classList.remove("forming")),
            600,
          );
        }

        if (igoCheck(game.turn))
          settleConflict(game.turn, "Strategic superiority established.");
        else {
          game.turn = game.turn === 1 ? 2 : 1;
          updateInterface();
        }
      }

      function updateInterface() {
        document.querySelectorAll(".cell").forEach((ce) => {
          const d = game.board[ce.dataset.r][ce.dataset.c];
          ce.innerHTML = "";
          if (d) {
            const p = document.createElement("div");
            p.className = `piece ${d.p === 1 ? "white" : "black"} ${d.y ? "yugo" : ""}`;
            ce.appendChild(p);
          }
        });
        document
          .getElementById("cd1")
          .classList.toggle("active", game.turn === 1);
        document
          .getElementById("cd2")
          .classList.toggle("active", game.turn === 2);
        document.getElementById("sDisp1").innerText = score(1);
        document.getElementById("sDisp2").innerText = score(2);
        document.getElementById("tagM").innerText = `#${game.moves.length + 1}`;
        drawLogs();
      }

      function drawLogs() {
        let rows = "";
        for (let i = 0; i < game.moves.length; i += 2) {
          rows += `<div class="reg-row">
            <span class="reg-num">${i / 2 + 1}.</span>
            <span>${game.moves[i]}</span>
            <span>${game.moves[i + 1] || "--"}</span>
          </div>`;
        }
        document.getElementById("logArea").innerHTML = rows;
        document.getElementById("matrixContainer").innerHTML = rows;
      }

      function toggleMatrix(s) {
        document.getElementById("modMat").classList.toggle("show", s);
      }

      function lineCheck(r, c, p) {
        for (let [dr, dc] of [
          [0, 1],
          [1, 0],
          [1, 1],
          [1, -1],
        ]) {
          let n = 1;
          for (let m of [-1, 1]) {
            let cr = r + dr * m,
              cc = c + dc * m;
            while (
              cr >= 0 &&
              cr < gameSize &&
              cc >= 0 &&
              cc < gameSize &&
              game.board[cr][cc]?.p === p
            ) {
              n++;
              cr += dr * m;
              cc += dc * m;
            }
          }
          if (n > 4) return true;
        }
        return false;
      }

      function scanYugo(r, c, p) {
        const lines = [];
        for (let [dr, dc] of [
          [0, 1],
          [1, 0],
          [1, 1],
          [1, -1],
        ]) {
          let ch = [[r, c]];
          for (let m of [-1, 1]) {
            let cr = r + dr * m,
              cc = c + dc * m;
            while (
              cr >= 0 &&
              cr < gameSize &&
              cc >= 0 &&
              cc < gameSize &&
              game.board[cr][cc]?.p === p
            ) {
              ch.push([cr, cc]);
              cr += dr * m;
              cc += dc * m;
            }
          }
          if (ch.length === 4) lines.push(ch);
        }
        return lines;
      }

      function igoCheck(p) {
        const yg = [];
        for (let r = 0; r < gameSize; r++)
          for (let c = 0; c < gameSize; c++)
            if (game.board[r][c]?.p === p && game.board[r][c].y)
              yg.push([r, c]);

        for (let [r, c] of yg) {
          for (let [dr, dc] of [
            [0, 1],
            [1, 0],
            [1, 1],
            [1, -1],
          ]) {
            let cnt = 1;
            for (let i = 1; i < 4; i++)
              if (yg.some((y) => y[0] === r + dr * i && y[1] === c + dc * i))
                cnt++;
            if (cnt >= 4) return true;
          }
        }
        return false;
      }

      function score(p) {
        return game.board
          .flat()
          .reduce((a, v) => (v?.p === p && v.y ? a + (v.stacks || 1) : a), 0);
      }

      function settleConflict(winner, msg) {
        game.over = true;
        document.getElementById("winTag").innerText =
          game.players[winner].n.toUpperCase() + " WINS";
        document.getElementById("winWhy").innerText = msg;
        document.getElementById("vs1").innerText = game.players[1].n;
        document.getElementById("vs2").innerText = game.players[2].n;
        document.getElementById("fS1").innerText = score(1);
        document.getElementById("fS2").innerText = score(2);
        document.getElementById("modVic").classList.add("show");
      }

      function forceSurrender() {
        settleConflict(
          game.turn === 1 ? 2 : 1,
          "Opposition retreated from field.",
        );
      }

      document.getElementById("btnU").onclick = () => {
        if (!game.undoStack.length) return;
        const s = game.undoStack.pop();
        game.board = s.b;
        game.turn = s.t;
        game.moves.pop();
        updateInterface();
      };
      document.getElementById("btnR").onclick = () => location.reload();
    </script>
  </body>
</html>
